<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ToolNest 무료 영상 웹 도구</title>
  <desc id="desc">타임코드 계산, 비트레이트 계산, 영상 클립 편집, SRT 자막 싱크 조정 도구를 제공하는 ToolNest 미리보기 이미지</desc>
  <rect width="1200" height="630" fill="#f7fbf8"/>
  <rect x="70" y="70" width="1060" height="490" rx="34" fill="#ffffff" stroke="#c9d8d3" stroke-width="3"/>
  <rect x="110" y="114" width="92" height="92" rx="22" fill="#196b69"/>
  <text x="156" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">TN</text>
  <text x="235" y="155" font-family="Arial, sans-serif" font-size="68" font-weight="700" fill="#123735">ToolNest</text>
  <text x="238" y="210" font-family="Arial, sans-serif" font-size="30" fill="#4c625e">브라우저에서 바로 쓰는 무료 영상 웹 도구</text>
  <g font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#123735">
    <rect x="120" y="300" width="225" height="120" rx="18" fill="#eef6f3"/>
    <text x="145" y="365">타임코드 계산</text>
    <rect x="375" y="300" width="225" height="120" rx="18" fill="#f6f7ea"/>
    <text x="400" y="365">비트레이트 계산</text>
    <rect x="630" y="300" width="225" height="120" rx="18" fill="#eef2f7"/>
    <text x="655" y="365">클립 편집</text>
    <rect x="885" y="300" width="225" height="120" rx="18" fill="#f7f1ee"/>
    <text x="910" y="365">자막 싱크</text>
  </g>
  <text x="120" y="498" font-family="Arial, sans-serif" font-size="24" fill="#5b6f6b">설치 없이, 회원가입 없이, 정적 웹사이트로 빠르게 실행됩니다.</text>
</svg>
